version: '3.8'

services:
  django:
    build: .
    container_name: django_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: >
      sh -c "
        python manage.py makemigrations &&
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - .:/app
    networks:
      - django_network

networks:
  django_network:
    driver: bridge